  <body>
    <div class="wrapper">

      <div class="container">
        <div class="fade-box">
          <img class="foto" src="/image/kucing kicau.gif" alt="" />
          <img class="gambar2" src="/image/sss.jpg" alt="">
        </div>

        <audio id="musik" src="music/kicau.mp3"></audio>

        <div class="tombol" id="btnmusic">
          <button onclick="playMusic()">Klik ini biar semangat</button>
          <button id="confety" onclick="ledak()" class="btn2">
            Klik ini Biar ketawa
          </button>
         <a class="instgram" href="https://www.instagram.com/hari_purnomo13/" target="_blank">
  jangan lupa follow
</a>
        </div>

        <div class="mapel-list">
          <div class="mapel-item">
            <div class="materi m2">PAI</div>
          </div>
          <div class="mapel-item">

          <div class="mapel-item">

        </div>

    </div>

    <div class="footer">
  <p>© 2026 Harpur.com | Made with ❤️ by Hari</p>
</div>
    <script>
      function changeBackgroundColor() {
        const colors = ["#D8E2DC", "#FFE5D9", "#FFCAD4", "#CDB4DB", "#A2D2FF"];
        const randomColor = colors[Math.floor(Math.random() * colors.length)];
        document.body.style.backgroundColor = randomColor;
      }
      changeBackgroundColor();
      setInterval(changeBackgroundColor, 1000);
    </script>
    <script>
      const audio = document.getElementById("musik");
      const btn = document.querySelector(".tombol button");

      let isPlaying = false;

      function playMusic() {
        if (!isPlaying) {
          audio.currentTime = 236;
          audio.play();
          btn.innerText = "Berhenti Berkicau 🐦";
          isPlaying = true;
        } else {
          audio.pause();
          btn.innerText = "Klik Disini";
          isPlaying = false;
        }
      }

      // loop dari 3:56 sampai 4:08
      audio.addEventListener("timeupdate", function () {
        if (audio.currentTime >= 248) {
          audio.currentTime = 238;
          audio.play();
        }
      });
    </script>
    <script>
      function tampilInformatika() {
        const list = document.getElementById("list-informatika");
        console.log("DIKLIK");
        list.classList.toggle("show");
      }
    </script>

    <script>
      function ledak() {
        confetti({
          spread: 360,
          ticks: 200,
          gravity: 1,
          decay: 0.94,
          startVelocity: 30,
          particleCount: 80,
          scalar: 1.2,

          shapes: ["image"],

          shapeOptions: {
            image: [
              {
                src: "./image/sss.jpg", // 🔥 FIX PALING AMAN
                width: 32,
                height: 32,
              },
            ],
          },
        });
      }
    </script>

    <script>
  const images = document.querySelectorAll(".fade-box img");
  let index = 0;

  function gantiGambar() {
  
    images.forEach(img => img.classList.remove("active"));

    
    images[index].classList.add("active");

    // pindah ke berikutnya
    index = (index + 1) % images.length;
  }

  // jalankan pertama kali
  gantiGambar();

  // ganti tiap 2 detik
  setInterval(gantiGambar, 1500);
</script>
  </body>
</html>
